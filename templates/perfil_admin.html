<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>NewCampus - Panel Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='js/admin_panel.js') }}"></script>
</head>

<body>

    <header class="main-header">
        <h2><span class="emoji">🎓</span><span class="title">Campus Konectia</span></h2>
    </header>

    <div class="admin-wrapper">
        <div class="admin-panel">
            <h2>Panel de Administración</h2>
            <p>Bienvenido, {{ session.get('user_name') }}</p>
            
            <div class="admin-buttons-grid">
                <button class="admin-btn" id="btn-usuarios" data-url="{{ url_for('admin.mod_usuarios') }}">
                    👥 Gestionar Usuarios
                </button>
                
                <button class="admin-btn" id="btn-asignaturas">
                    📚 Gestionar Asignaturas
                </button>
                
                <button class="admin-btn" id="btn-horarios">
                    🕐 Gestionar Horarios
                </button>
                
                <button class="admin-btn" id="btn-reportes">
                    📊 Reportes
                </button>
                
                <button class="admin-btn" id="btn-configuracion">
                    ⚙️ Configuración
                </button>
                
                <button class="admin-btn" id="btn-nuevo">
                    ⭐ Nuevo
                </button>
                
                <button class="admin-btn btn-logout" id="btn-cerrar" data-url="{{ url_for('auth.logout') }}">
                    🚪 Cerrar Sesión
                </button>
            </div>
        </div>
    </div>

</body>

</html>
