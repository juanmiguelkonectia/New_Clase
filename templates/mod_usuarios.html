<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>NewCampus - Gestionar Usuarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- rutas dinámicas necesarias para mod_usuarios.js -->
    <script>
        const URL_BUSCAR_USUARIOS = "{{ url_for('admin.buscar_usuarios') }}";
        const URL_ACTUALIZAR_USUARIO = "{{ url_for('admin.actualizar_usuario') }}";
        const URL_CREAR_USUARIO = "{{ url_for('admin.crear_usuario') }}";
    </script>
    <script defer src="{{ url_for('static', filename='js/mod_usuarios.js') }}"></script>
</head>

<body>

    <header class="main-header">
        <h2><span class="emoji">🎓</span><span class="title">Campus Konectia</span></h2>
    </header>

    <div class="mod-wrapper">
        <div class="mod-container">
            <div class="mod-header">
                <h2>👥 Gestionar Usuarios</h2>
                <a href="{{ url_for('admin.perfil_admin') }}" class="btn-back">← Volver al Panel</a>
            </div>

            <!-- SECCIÓN DE BÚSQUEDA DE USUARIOS -->
            <div class="search-section">
                <h3>Buscar Usuario (limitado a 10 por consulta)</h3>
                <form id="search-form" class="search-form">
                    <input type="text" id="search-input" placeholder="Buscar por nombre, email o fecha (YYYY-MM-DD)...">
                    <button type="submit" class="btn-search">🔍 Buscar</button>
                </form>
                <div id="search-results" class="search-results"></div>
            </div>

            <!-- SECCIÓN DE EDITAR USUARIO (inicialmente oculta) -->
            <div class="edit-section" style="display:none;">
                <h3>✏️ Editar Usuario</h3>
                <form id="edit-form" class="edit-form">
                    <input type="hidden" id="edit-id">

                    <div class="form-group">
                        <label for="edit-username">Nombre de Usuario:</label>
                        <input type="text" id="edit-username" name="username" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-email">Correo Electrónico:</label>
                        <input type="email" id="edit-email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-password">Contraseña (dejar en blanco para no cambiar):</label>
                        <input type="password" id="edit-password" name="password">
                    </div>

                    <div class="form-group">
                        <label for="edit-rol">Rol:</label>
                        <select id="edit-rol" name="rol" required>
                            <option value="">-- Selecciona un rol --</option>
                            <option value="Profesor">Profesor</option>
                            <option value="Alumno">Alumno</option>
                            <option value="Oficina">Oficina</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-update">💾 Guardar Cambios</button>
                    <button type="button" id="cancel-edit" class="btn-cancel">✖️ Cancelar</button>
                </form>
                <div id="edit-message" class="message"></div>
            </div>

            <!-- SECCIÓN DE CREAR USUARIO -->
            <div class="create-section">
                <h3>🆕 Crear Nuevo Usuario</h3>
                <form id="create-form" method="POST" class="create-form">
                    <div class="form-group">
                        <label for="new-username">Nombre de Usuario:</label>
                        <input type="text" id="new-username" name="username" required>
                    </div>

                    <div class="form-group">
                        <label for="new-email">Correo Electrónico:</label>
                        <input type="email" id="new-email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="new-password">Contraseña:</label>
                        <input type="password" id="new-password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="new-rol">Rol:</label>
                        <select id="new-rol" name="rol" required>
                            <option value="">-- Selecciona un rol --</option>
                            <option value="Profesor">Profesor</option>
                            <option value="Alumno">Alumno</option>
                            <option value="Oficina">Oficina</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-create">✅ Crear Usuario</button>
                </form>
                <div id="create-message" class="message"></div>
            </div>
        </div>
    </div>

</body>

</html>
